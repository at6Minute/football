<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>足球合作挑战 - 关卡 1：双人传球</title>
<link rel="stylesheet" href="css/style.css">

<style>
/* 全局重置：消除默认边距、禁用手势 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    touch-action: manipulation; /* 禁用双击缩放 */
    -webkit-touch-callout: none; /* 禁用长按菜单 */
    -webkit-user-select: none; /* 禁用文本选择 */
    user-select: none;
}

html {
    width: 100%;
    height: 100dvh; /* 动态视口高度，适配平板地址栏 */
    overflow: hidden;
}

body {
    background-image: url("image/home.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    width: 100%;
    height: 100%;
    min-height: 100%;
    overflow: hidden; /* 禁止页面滚动 */
    position: relative;
}

.game-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    padding: 10px;
    box-sizing: border-box;
}

.panel {
    color: white;
    margin-bottom: 10px;
    font-size: 20px;
    text-align: center;
}

.controls-info {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 900px;
    margin: 10px auto;
    color: white;
    font-size: 16px;
    gap: 20px;
    padding: 0 20px;
    box-sizing: border-box;
}

.control-side {
    flex: 1;
    padding: 15px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 30px;
    min-width: 0;
}

.control-side h3 {
    position: absolute;
    left: -9999px;
}

.control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 120px;
}

.joystick-area {
    position: relative;
    width: 120px;
    height: 120px;
    background: rgba(200, 200, 200, 0.3);
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(5px);
}

.joystick-knob {
    position: absolute;
    width: 50px;
    height: 50px;
    background: rgba(200, 200, 200, 0.5);
    border-radius: 50%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    border: 2px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

.charge-btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(200, 200, 200, 0.3);
    border: 3px solid rgba(255, 255, 255, 0.5);
    color: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(5px);
    transition: all 0.1s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.3;
    position: relative;
    overflow: hidden;
}

.charge-btn:hover {
    background: rgba(200, 200, 200, 0.4);
    transform: scale(1.05);
}

.charge-btn:active {
    transform: scale(0.95);
}

.charge-btn.active {
    background: rgba(76, 175, 80, 0.5);
    border-color: rgba(76, 175, 80, 0.8);
}

.charge-btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.control-label {
    font-size: 13px;
    color: #ddd;
    text-align: center;
    margin-top: 5px;
}
</style>
</head>

<body>
<div class="game-container">
    <div class="panel">
        <div id="turnText">当前回合：玩家 1 准备传球</div>
    </div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="controls-info">
        <div class="control-side">
            <div class="control-group">
                <h3>玩家 1 控制区</h3>
                <div class="joystick-area" id="joystick1">
                    <div class="joystick-knob" id="knob1"></div>
                </div>
                <div class="control-label">摇杆<br>移动</div>
            </div>

            <div class="control-group">
                <button class="charge-btn" id="chargeBtn1">蓄力<br>传球</button>
                <div class="control-label">长按蓄力<br>松开发射</div>
            </div>
        </div>

        <div class="control-side">
            <div class="control-group">
                <h3>玩家 2 控制区</h3>
                <div class="joystick-area" id="joystick2">
                    <div class="joystick-knob" id="knob2"></div>
                </div>
                <div class="control-label">摇杆<br>移动</div>
            </div>

            <div class="control-group">
                <button class="charge-btn" id="chargeBtn2">蓄力<br>传球</button>
                <div class="control-label">长按蓄力<br>松开发射</div>
            </div>
        </div>
    </div>

</div>

<script src="js/game.js"></script>
<script>
// 平板端优化：防止误触和缩放
(function() {
    // 1. 页面加载后强制隐藏地址栏
    window.addEventListener('load', () => {
        setTimeout(() => {
            window.scrollTo(0, 1);
        }, 0);
    });

    // 2. 监听视口变化，动态调整高度
    window.addEventListener('resize', () => {
        document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    });

    // 3. 防误触：禁止多指操作
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) {
            e.preventDefault();
        }
    }, { passive: false });

    // 4. 禁止快速点击缩放
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
            e.preventDefault();
        }
        lastTouchEnd = now;
    }, { passive: false });

    // 5. 阻止默认触摸行为（除游戏区域外）
    document.addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });
})();
</script>
</body>
</html>
